<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Học Viện Hàng Không - Blockchain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #004e92 0%, #000428 100%); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .glass-panel { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px; text-align: center; }
        .role-card { background: white; color: #333; border-radius: 15px; padding: 30px 20px; transition: 0.3s; text-decoration: none; display: block; height: 100%; }
        .role-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <img src="https://upload.wikimedia.org/wikipedia/vi/1/1e/Hoc_vien_Hang_khongVN.PNG" alt="Logo" style="height: 100px;" class="mb-4">
            <h1 class="fw-bold text-uppercase mb-2">Học Viện Hàng Không Việt Nam</h1>
            <p class="lead mb-5 opacity-75">Hệ thống Quản lý Văn bằng trên Blockchain</p>
            
            <div class="row g-4 justify-content-center">
                <div class="col-md-4">
                    <a href="admin.html" class="role-card">
                        <i class="fas fa-university fa-3x text-primary mb-3"></i>
                        <h4 class="fw-bold text-primary">Nhà Trường</h4>
                        <div class="btn btn-outline-primary w-100 mt-2 rounded-pill">Truy cập Admin</div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="student.html" class="role-card">
                        <i class="fas fa-user-graduate fa-3x text-warning mb-3"></i>
                        <h4 class="fw-bold text-warning">Sinh Viên</h4>
                        <div class="btn btn-outline-warning text-dark w-100 mt-2 rounded-pill">Truy cập Student</div>
                    </a>
                </div>
                <div class="col-md-4">
                    <a href="employer.html" class="role-card">
                        <i class="fas fa-search-dollar fa-3x text-success mb-3"></i>
                        <h4 class="fw-bold text-success">Tuyển Dụng</h4>
                        <div class="btn btn-outline-success w-100 mt-2 rounded-pill">Truy cập Verify</div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
