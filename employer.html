<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tuyển Dụng - Xác Thực QR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style> 
        body { background: #f0f2f5; font-family: sans-serif; } 
        .hero-section { background: #004e92; color: white; padding: 50px 0 90px; text-align: center; border-radius: 0 0 30px 30px; } 
        .main-card { margin-top: -60px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 40px; border-top: 6px solid #198754; } 
        .qr-upload-box { border: 2px dashed #198754; padding: 40px 20px; text-align: center; border-radius: 15px; cursor: pointer; transition: 0.3s; background: #f8f9fa; display: block; }
        .qr-upload-box:hover { background: #e9ecef; border-color: #146c43; transform: translateY(-2px); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="container">
            <h2 class="fw-bold text-uppercase">Cổng Xác Thực Nhà Tuyển Dụng</h2>
            <p class="opacity-75 mb-3">Hệ thống quét mã QR tự động qua Blockchain</p>
            <a href="index.html" class="btn btn-outline-light btn-sm rounded-pill px-4"><i class="fas fa-home"></i> Về trang chủ</a>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="main-card">
                    
                    <div id="searchScreen">
                        <label class="qr-upload-box w-100 shadow-sm">
                            <i class="fas fa-qrcode fa-4x text-success mb-3"></i>
                            <h4 class="fw-bold text-success">Bấm vào đây để tải ảnh QR</h4>
                            <p class="text-muted mb-0 mt-2">Hệ thống sẽ tự động quét và đối chiếu dữ liệu gốc</p>
                            <input type="file" id="qrUpload" accept="image/*">
                        </label>
                        <div class="text-center mt-3 d-none" id="scanningLoader">
                            <div class="spinner-border text-success spinner-border-sm" role="status"></div> <span class="text-success fw-bold">Đang giải mã QR...</span>
                        </div>
                    </div>

                    <input type="hidden" id="searchId">

                    <div id="resultArea" style="display: none;">
                        <div id="statusBox" class="p-3 rounded-3 text-center text-white mb-4 shadow-sm">
                            <div class="display-4 mb-2"><i class="fas fa-check-circle"></i></div>
                            <h2 id="mainStatus" class="fw-bold mb-0">VERIFIED</h2>
                            <p id="subMessage" class="mb-0 small">Hồ sơ hợp lệ và tồn tại trên Blockchain.</p>
                        </div>
                        
                        <div id="detailBox" class="card bg-light border-0 shadow-sm">
                            <div class="card-body p-4">
                                <h6 class="text-uppercase text-muted fw-bold border-bottom pb-2 mb-3">Thông tin trích xuất:</h6>
                                <div class="row g-3">
                                    <div class="col-4 text-secondary">Họ và tên:</div> <div class="col-8 fw-bold fs-5 text-primary" id="resName"></div>
                                    <div class="col-4 text-secondary">Ngành:</div> <div class="col-8 fw-bold" id="resMajor"></div>
                                    <div class="col-4 text-secondary">Xếp loại:</div> <div class="col-8 fw-bold" id="resClass"></div>
                                    <div class="col-4 text-secondary">Ngày cấp:</div> <div class="col-8" id="resDate"></div>
                                </div>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button onclick="location.reload()" class="btn btn-outline-success rounded-pill px-4"><i class="fas fa-sync-alt"></i> Quét mã khác</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Xử lý tự động quét QR khi tải ảnh lên
        document.getElementById('qrUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('scanningLoader').classList.remove('d-none');
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.width = img.width; canvas.height = img.height;
                    context.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
                    
                    document.getElementById('scanningLoader').classList.add('d-none');

                    if (code) {
                        // Ẩn khu vực upload, hiện kết quả
                        document.getElementById('searchScreen').style.display = 'none';
                        // Gán ID quét được vào input ẩn và gọi hàm kiểm tra
                        document.getElementById('searchId').value = code.data;
                        verifyDiploma(); 
                    } else {
                        alert("❌ Lỗi: Hình ảnh không chứa mã QR hoặc bị mờ. Vui lòng thử lại!");
                        document.getElementById('qrUpload').value = "";
                    }
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
